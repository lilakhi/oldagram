<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="container">
            <header>
                <img id="logo" src="images/logo.png">
                <!-- <img self avatar> -->
                <img class="avis" id="userAVI" src="images/user-avatar.png">
            </header>
            
            <section class="post-meta">
            <!-- <img user avatar> -->
                <img class="avis" id="avi" src="images/avatar-vangogh.jpg">
                <div class="name-location">
                    <h2 id="name">Vincent van Gogh</h2>
                    <p id="location">Zundert, Netherlands</p>
                </div>
            </section>
            
            <section class="post">
                <img id="gogh" src="images/post-vangogh.jpg">
            </section>
            
            <section class="post-action">
            <!-- <buttons> -->
            <div class="buttons">
                <img class="btn" id="heart" src="images/icon-heart.png">
                <img class="btn" id="comment" src="images/icon-comment.png">
                <img class="btn" id="dm" src="images/icon-dm.png">
            </div>
            <!-- <likes> -->
                <h2 id="likes">21,234 likes</h2>
            </section>

            
            <section class="caption">
                <p id="caption"><span id="username">vincey1853</span><span id="comment">just took a few mushrooms lol</span></p>
            </section>
            <script src="index.js"></script>
            
        </div>
    </body>
</html>
